name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version (z. B. 1.0.0, 1.0.0-beta.1)'
        required: true
        type: string
      draft:
        description: 'Als Entwurf (Draft) auf GitHub erstellen?'
        required: true
        type: boolean
        default: false

# Erforderliche Berechtigungen zum Schreiben von Tags und Releases
permissions:
  contents: write

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Wichtig für automatische Release-Notes

      - name: .NET SDK einrichten
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Abhängigkeiten wiederherstellen
        run: dotnet restore

      - name: Projekt bauen
        run: dotnet build --no-restore --configuration Release

      - name: Tests ausführen
        run: dotnet test --no-build --configuration Release

      - name: NuGet-Paket erstellen
        run: |
          dotnet pack CavalierContours/CavalierContours.csproj \
            --configuration Release \
            --no-build \
            -p:Version=${{ github.event.inputs.version }} \
            --output artifacts/

      - name: Auf NuGet.org veröffentlichen
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Git Tag erstellen und pushen
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "Release v${{ github.event.inputs.version }}"
          draft: ${{ github.event.inputs.draft }}
          prerelease: ${{ contains(github.event.inputs.version, '-') }}
          generate_release_notes: true
          files: artifacts/*.nupkg
